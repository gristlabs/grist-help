webinar_cards:
  heading: Popular webinars
  intro: Join us as we dive into Grist – from the essentials to advanced tricks.
  items:
    - title: Grist 101
      description: Designed to help new users navigate the basics of Grist and will provide you with the essential tools and knowledge to get started
      image: /images/home/webinar1.png
      url: https://www.getgrist.com/webinars/grist-101-new-users-guide/
    - title: Build your document with AI
      description: A simple, practical look at what AI can (and can’t) do with relational spreadsheets. Start with a blank page and end with a custom foundation
      image: /images/home/webinar2.png
      url: https://www.getgrist.com/webinars/build-your-document-with-ai/
    - title: How to migrate from Airtable to Grist
      description: Learn how to import Airtable bases into Grist while preserving relationships, formatting, and even attachments – with real-life examples
      image: /images/home/webinar3.png
      url: https://www.getgrist.com/webinars/migrate-airtable-to-grist-webinar/
featured_cards:
  heading: Tutoriels en vedette
  intro: Commencez à construire rapidement avec ces tutoriels étape par étape.
  items:
    - title: Créer votre propre CRM
      description: Explorez les capacités puissantes de la base de données de Grist et apprenez comment lier des enregistrements pour créer des mises en page à haute productivité pour simplifier vos opérations commerciales
      image: /images/home/custom-crm.jpg
      url: lightweight-crm/
    - title: Gérer les données commerciales
      description: Racontez l'histoire derrière vos données avec des tableaux récapitulatifs, des widgets, des graphiques dynamiques et plus encore
      image: /images/home/business-data.jpg
      url: afterschool-program/
    - title: Analyser et visualiser des données
      description: Transformez les données d'aujourd'hui en profits de demain avec des formules pour modéliser des données et des outils pour vous aider à couper à travers le bruit
      image: /images/home/analyze-data.jpg
      url: investment-research/
more_info_cards:
  heading: Plus de ressources de support
  intro: Cherchez-vous plus d'aide? Connectez-vous avec la communauté d'utilisateurs de Grist, ou contactez notre équipe.
  items:
    - title: Rejoindre la communauté
      description: Connectez-vous avec d'autres membres de la communauté de Grist et notre équipe
      icon: /images/home/community.svg
      url: https://community.getgrist.com/
    - title: Discuter sur Discord
      description: Connectez-vous avec d'autres membres de la communauté de Grist et notre équipe
      icon: /images/home/discord.svg
      url: https://discord.gg/MYKpYQ3fbP
    - title: Contacter le support
      description: Connectez-vous avec d'autres membres de la communauté de Grist et notre équipe
      icon: /images/home/mail.svg
      url: https://www.getgrist.com/contact/
